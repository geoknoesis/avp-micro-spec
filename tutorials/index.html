<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tutorials — AVP-Micro</title>
  <meta name="description" content="Learn the AVP-Micro stack from first principles: digital payments, agent payments, identity & cryptography, the payment lifecycle, settlement, and conformance.">
  <link rel="canonical" href="https://geoknoesis.github.io/avp-micro-spec/tutorials/">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="stylesheet" href="../assets/avp.css?v=3">
  <style>
    /* tutorial reader — uses the site's design tokens (avp.css :root), nothing in avp.css is touched */
    .tut-wrap { max-width: var(--maxw); margin: 0 auto; padding: 28px 22px 80px;
      display: grid; grid-template-columns: 268px minmax(0, 1fr); gap: 40px; }
    .tut-side { position: sticky; top: calc(var(--nav-h) + 16px); align-self: start; max-height: calc(100vh - var(--nav-h) - 40px); overflow:auto; }
    .tut-side h4 { font-size: .72rem; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin: 0 0 12px; }
    .tut-side ol { list-style: none; margin: 0; padding: 0; counter-reset: t; }
    .tut-side li { margin: 1px 0; }
    .tut-side a { display: flex; gap: 9px; align-items: baseline; padding: 7px 10px; border-radius: 9px;
      color: var(--slate); text-decoration: none; font-size: .9rem; line-height: 1.3; border: 1px solid transparent; }
    .tut-side a:hover { background: var(--soft); }
    .tut-side a.active { background: var(--surface); border-color: var(--line); color: var(--ink); font-weight: 600; }
    .tut-side a.soon { color: #94a3b8; cursor: default; }
    .tut-side .num { font-variant-numeric: tabular-nums; color: var(--muted); font-size: .78rem; min-width: 1.4em; }
    .tut-side a.active .num { color: var(--blue); }
    .tut-side .soon-tag { margin-left:auto; font-size:.6rem; letter-spacing:.1em; text-transform:uppercase; color:#94a3b8; align-self:center; }

    .prose { min-width: 0; color: var(--slate); font-size: 1.02rem; line-height: 1.72; }
    .prose > :first-child { margin-top: 0; }
    .prose h1 { font-size: 2rem; margin: .2em 0 .4em; }
    .prose h2 { font-size: 1.4rem; margin: 1.9em 0 .5em; padding-top: .3em; border-top: 1px solid var(--line); }
    .prose h3 { font-size: 1.12rem; margin: 1.5em 0 .4em; }
    .prose p, .prose li { color: var(--slate); }
    .prose a { color: var(--blue); text-decoration: none; border-bottom: 1px solid #bfdbfe; }
    .prose a:hover { border-bottom-color: var(--blue); }
    .prose strong { color: var(--ink); }
    .prose blockquote { margin: 1.2em 0; padding: .8em 1.1em; background: var(--surface);
      border-left: 4px solid var(--teal); border-radius: 0 12px 12px 0; color: var(--ink-2); }
    .prose blockquote p { color: var(--ink-2); margin: .4em 0; }
    .prose code { font-family: var(--mono); font-size: .88em; background: #eef2f7; color: #0b3b6f;
      padding: .12em .38em; border-radius: 6px; }
    .prose pre { background: var(--code-bg); color: var(--code-fg); padding: 16px 18px; border-radius: var(--radius-sm);
      overflow: auto; margin: 1.2em 0; box-shadow: var(--shadow-sm); }
    .prose pre code { background: none; color: inherit; padding: 0; font-size: .85rem; line-height: 1.6; }
    .prose table { width: 100%; border-collapse: collapse; margin: 1.3em 0; font-size: .92rem; display:block; overflow-x:auto; }
    .prose th, .prose td { border: 1px solid var(--line); padding: 9px 12px; text-align: left; vertical-align: top; }
    .prose th { background: var(--soft); color: var(--ink); font-weight: 700; }
    .prose tr:nth-child(even) td { background: #fbfdff; }
    .prose hr { border: 0; border-top: 1px solid var(--line); margin: 2.4em 0; }
    .prose .mermaid { margin: 1.4em 0; text-align: center; }
    .tut-pager { display: flex; justify-content: space-between; gap: 16px; margin-top: 48px; padding-top: 22px; border-top: 1px solid var(--line); }
    .tut-pager a { text-decoration: none; border: 1px solid var(--line); border-radius: 12px; padding: 12px 16px; color: var(--ink);
      max-width: 48%; transition: border-color .15s, box-shadow .15s; }
    .tut-pager a:hover { border-color: var(--blue); box-shadow: var(--shadow-sm); }
    .tut-pager .dir { display:block; font-size:.7rem; letter-spacing:.12em; text-transform:uppercase; color: var(--muted); margin-bottom:3px; }
    .tut-pager .nxt { text-align: right; margin-left: auto; }
    .tut-loading { color: var(--muted); padding: 40px 0; }
    .tut-soon { background: var(--soft); border: 1px dashed var(--line); border-radius: var(--radius); padding: 40px; text-align: center; color: var(--muted); }
    @media (max-width: 880px) { .tut-wrap { grid-template-columns: 1fr; } .tut-side { position: static; max-height:none; } }
  </style>
</head>
<body>

    <a class="brand" href="../index.html#top">

      AVP-Micro

    <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>

<main id="top">

      <p class="tut-loading">Loading…</p>

<footer class="footer">

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script src="../assets/avp.js?v=2" defer></script>
<script>
(function () {
  // The curriculum. `file` is the markdown source under ../docs/tutorials/.
  // `ready:false` => listed but not yet written (shows a friendly placeholder).
  const TUTS = [
    { id: "01", slug: "01-introduction-to-digital-payments", title: "Introduction to Digital Payments", ready: true },
    { id: "02", slug: "02-why-agent-payments-are-different", title: "Why AI-Agent Payments Are Different", ready: true },
    { id: "03", slug: "03-the-stack-at-a-glance", title: "The AVP-Micro Stack at a Glance", ready: true },
    { id: "04", slug: "04-identity-and-cryptography", title: "Identity & Cryptography", ready: true },
    { id: "05", slug: "05-delegated-spending-authority", title: "Delegated Spending Authority", ready: true },
    { id: "06", slug: "06-the-payment-lifecycle", title: "The Payment Lifecycle", ready: true },
    { id: "07", slug: "07-streaming-and-metered-payments", title: "Streaming & Metered Payments", ready: true },
    { id: "08", slug: "08-http-402-transport", title: "The HTTP 402 Transport Binding", ready: true },
    { id: "09", slug: "09-settlement", title: "Settlement & the Rails", ready: true },
    { id: "10", slug: "10-interop", title: "Interop: SD-JWT-VC & AP2", ready: true },
    { id: "11", slug: "11-refunds-reversals-disputes", title: "Refunds, Reversals & Disputes", ready: true },
    { id: "12", slug: "12-revocation-and-status", title: "Revocation & Status", ready: true },
    { id: "13", slug: "13-conformance", title: "Conformance", ready: true },
    { id: "14", slug: "14-hands-on", title: "Hands-on", ready: true },
  ];
  const byId = Object.fromEntries(TUTS.map(t => [t.id, t]));
  const MD_BASE = "../docs/tutorials/";

  const toc = document.getElementById("tutToc");
  const content = document.getElementById("tutContent");

  mermaid.initialize({ startOnLoad: false, theme: "neutral", securityLevel: "loose" });

  function renderToc(activeId) {
    toc.innerHTML = "";
    for (const t of TUTS) {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.innerHTML = `<span class="num">${t.id}</span><span>${t.title}</span>` +
        (t.ready ? "" : `<span class="soon-tag">soon</span>`);
      if (t.ready) { a.href = "#" + t.id; } else { a.className = "soon"; }
      if (t.id === activeId) a.classList.add("active");
      li.appendChild(a);
      toc.appendChild(li);
    }
  }

  // Markdown links are authored relative to /docs/tutorials/ (e.g. ../../spec/...).
  // The reader lives one level shallower (/tutorials/), and sibling tutorials become
  // in-reader hash navigation. Rewrite accordingly.
  function fixLinks(root) {
    root.querySelectorAll("a[href]").forEach(a => {
      let href = a.getAttribute("href");
      if (!href || href.startsWith("http") || href.startsWith("#")) return;
      const sib = href.match(/(?:\.\/)?(\d\d)-[a-z0-9-]+\.md$/i);
      if (sib && byId[sib[1]]) { a.setAttribute("href", "#" + sib[1]); return; }
      if (/(?:^|\/)README\.md$/i.test(href)) { a.setAttribute("href", "#" + TUTS[0].id); return; }
      // ../../X  (repo-root/X from /docs/tutorials/)  ->  ../X  (from /tutorials/)
      if (href.startsWith("../../")) a.setAttribute("href", href.replace("../../", "../"));
    });
  }

  async function renderMermaid(root) {
    const blocks = root.querySelectorAll("pre > code.language-mermaid, code.language-mermaid");
    let i = 0;
    for (const code of blocks) {
      const div = document.createElement("div");
      div.className = "mermaid";
      div.textContent = code.textContent;
      const pre = code.closest("pre") || code;
      pre.replaceWith(div);
      i++;
    }
    if (i) { try { await mermaid.run({ querySelector: ".mermaid" }); } catch (e) { /* leave source */ } }
  }

  function pager(t) {
    const idx = TUTS.findIndex(x => x.id === t.id);
    const prev = TUTS[idx - 1], next = TUTS[idx + 1];
    const link = (x, dir, cls) => x
      ? `<a class="${cls}" href="${x.ready ? "#" + x.id : "#" + x.id}"><span class="dir">${dir}</span>${x.id} · ${x.title}</a>`
      : "<span></span>";
    return `<nav class="tut-pager">${link(prev, "← Previous", "prv")}${link(next, "Next →", "nxt")}</nav>`;
  }

  async function show(id) {
    const t = byId[id] || TUTS[0];
    renderToc(t.id);
    document.title = `${t.id} · ${t.title} — AVP-Micro Tutorials`;
    if (!t.ready) {
      content.innerHTML = `<h1>${t.title}</h1><div class="tut-soon"><p><strong>This tutorial is coming soon.</strong></p>` +
        `<p>The series is being written in order. Start with ` +
        `<a href="#${TUTS[0].id}">${TUTS[0].id} — ${TUTS[0].title}</a>.</p></div>` + pager(t);
      window.scrollTo(0, 0); return;
    }
    content.innerHTML = `<p class="tut-loading">Loading ${t.title}…</p>`;
    try {
      const res = await fetch(MD_BASE + t.slug + ".md", { cache: "no-cache" });
      if (!res.ok) throw new Error(res.status);
      let md = await res.text();
      // drop the in-file "> Series / Next" banner (we provide site nav + a pager instead)
      md = md.replace(/^> \*\*Series:\*\*[\s\S]*?\n(?:>.*\n)*/m, "");
      content.innerHTML = marked.parse(md);
      fixLinks(content);
      await renderMermaid(content);
      content.insertAdjacentHTML("beforeend", pager(t));
    } catch (e) {
      content.innerHTML = `<h1>${t.title}</h1><div class="tut-soon"><p>Couldn't load this tutorial` +
        ` (<code>${MD_BASE}${t.slug}.md</code>).</p><p>On the live site this loads automatically; ` +
        `for a local preview, serve the repo over HTTP (e.g. <code>python -m http.server</code>) rather than opening the file directly.</p></div>`;
    }
    window.scrollTo(0, 0);
  }

  function current() { return (location.hash || "#01").replace("#", "").slice(0, 2); }
  window.addEventListener("hashchange", () => show(current()));
  renderToc(current());
  show(current());
})();
</script>
</body>
</html>
